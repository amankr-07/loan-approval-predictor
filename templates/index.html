<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Eligibility Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>

<div class="hero-section">
    <div class="container text-center">
        <h1 class="fw-bold">Loan Eligibility Portal</h1>
        <p class="opacity-75">Professional Credit Assessment Tool</p>
    </div>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card main-card p-4 p-md-5">
                <form action="/predict" method="post">
                    
                    <div class="section-header">
                        <i class="bi bi-person-badge"></i> Personal Profile
                    </div>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label">Gender</label>
                            <select class="form-select" name="gender">
                                <option value="1">Male</option>
                                <option value="0">Female</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Marital Status</label>
                            <select class="form-select" name="married">
                                <option value="1">Married</option>
                                <option value="0">Single / Other</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Dependents</label>
                            <select class="form-select" name="dependents">
                                <option value="0">None</option>
                                <option value="1">1 Dependent</option>
                                <option value="2">2 Dependents</option>
                                <option value="3">3+ Dependents</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Education</label>
                            <select class="form-select" name="education">
                                <option value="1">Graduate</option>
                                <option value="0">Undergraduate</option>
                            </select>
                        </div>
                    </div>

                    <div class="section-header">
                        <i class="bi bi-currency-exchange"></i> Financial Status
                    </div>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label">Primary Monthly Income</label>
                            <div class="input-group has-icon">
                                <span class="input-group-text text-muted">₹</span>
                                <input type="number" class="form-control" name="income" placeholder="e.g. 50000" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Co-Applicant Income</label>
                            <div class="input-group has-icon">
                                <span class="input-group-text text-muted">₹</span>
                                <input type="number" class="form-control" name="coincome" placeholder="0 if none" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Employment</label>
                            <select class="form-select" name="self_employed">
                                <option value="0">Salaried Professional</option>
                                <option value="1">Self Employed / Business</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Credit History</label>
                            <select class="form-select" name="credit">
                                <option value="1">Clean / Good Credit</option>
                                <option value="0">Issues / Poor Credit</option>
                            </select>
                        </div>
                    </div>

                    <div class="section-header">
                        <i class="bi bi-house-door"></i> Loan Requirements
                    </div>
                    <div class="row g-4">
                        <div class="col-md-4">
                            <label class="form-label">Amount (in '000s)</label>
                            <input type="number" class="form-control" name="loanamount" placeholder="e.g. 300" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Term (Months)</label>
                            <input type="number" class="form-control" name="term" value="360">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Property Type</label>
                            <select class="form-select" name="area">
                                <option value="2">Urban</option>
                                <option value="1">Semiurban</option>
                                <option value="0">Rural</option>
                                <option value="3">Not Specified</option>
                            </select>
                        </div>
                    </div>

                    <div class="text-center mt-5">
                        <button type="submit" class="btn btn-predict btn-lg w-100">
                            Analyze Eligibility <i class="bi bi-arrow-right ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
